        mediaArtists:
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/MediaArtist"
        mediaGroups:
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/MediaGroup"
        labels:
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/Label"
    MediaArtist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        artist:
          $ref: "#/components/schemas/Artist"
        mediaArtistRole:
