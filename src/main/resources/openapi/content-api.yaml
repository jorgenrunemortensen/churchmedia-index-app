  /api/v1/feature/my:
    get:
      tags:
      - Feature Controller
      summary: Get information of which features that the front end should make available
        to the current user
      description: "<p>For each feature presented in the response, the feature should\
        \ be visible. To each feature an operation is defined. I.e. NONE, VIEW or\
        \ EDIT.</p><ul><li>NONE should not provide any access to the feature, i.e.\
        \ no data should be displayed neither it should be possible to modify any\
        \ data.</li><li>VIEW should provide access to the feature, i.e. data should\
        \ be displayed but it should not be possible for the user to modify any data.</li><li>EDIT\
        \ should provide full access to the feature, i.e. data should be displayed\
        \ and it should be possible for the user to modify the data.</li></ul>"
      operationId: my
      responses:
        "200":
