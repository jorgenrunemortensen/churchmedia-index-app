components:
  schemas:
    RoleCommand:
      type: object
      properties:
        name:
          type: string
        authority:
          type: string
        description:
          type: string
    Role:
      required:
      - authority
      - id
      - name
      - version
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        name:
          type: string
        authority:
          type: string
        description:
          type: string
    MediaArtistDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        artistId:
          type: string
          format: uuid
        mediaArtistRoleId:
          type: string
          format: uuid
    MediaCommand:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
        recordedAt:
          type: string
          format: date-time
        mediaFile:
          $ref: "#/components/schemas/MediaFile"
        mediaArtistDTOs:
          uniqueItems: true
          type: array
          items:
            $ref: "#/components/schemas/MediaArtistDTO"
        mediaGroupIds:
          uniqueItems: true
          type: array
          items:
            type: string
            format: uuid
        labelIds:
          uniqueItems: true
          type: array
          items:
            type: string
            format: uuid
    MediaFile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        storage:
          type: string
          enum:
          - FILE_SERVER
        fileId:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
    Artist:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the artist entity.
          format: uuid
        version:
          type: integer
          description: The version of the artist entity for optimistic locking.
          format: int64
        createdAt:
          type: string
          description: The timestamp when the artist entity was created.
          format: date-time
        createdBy:
          type: string
          description: The username of the user who created the artist entity.
        updatedAt:
          type: string
          description: The timestamp when the artist entity was last updated.
          format: date-time
        updatedBy:
          type: string
          description: The username of the user who last updated the artist entity.
        name:
          type: string
          description: The name of the artist.
        description:
          type: string
          description: The description of the artist.
      description: Data transfer object representing an artist entity.
    Label:
      required:
      - createdAt
      - createdBy
      - id
      - name
      - updatedAt
      - updatedBy
      - version
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        name:
          type: string
        description:
          type: string
    Media:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
        name:
          type: string
        description:
          type: string
        recordedAt:
          type: string
          format: date-time
        mediaFile:
